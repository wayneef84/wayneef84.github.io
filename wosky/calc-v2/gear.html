<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chief Gear — WOSKY_3169 Calc v2</title>
  <link rel="stylesheet" href="../css/wosky.css">
  <link rel="stylesheet" href="calc-v2.css">
</head>
<body>
  <nav class="wosky-nav">
    <a href="../../index.html" class="wosky-nav-home">&#8592; Hub</a>
    <span class="wosky-nav-sep">/</span>
    <a href="../index.html" class="wosky-nav-home">WOSKY_3169</a>
    <span class="wosky-nav-sep">/</span>
    <a href="index.html" class="wosky-nav-home">Calc v2</a>
    <span class="wosky-nav-sep">/</span>
    <span class="wosky-nav-brand">&#9876;&#65039; Chief Gear</span>
  </nav>
  <div id="wosky-char-bar"></div>
  <div class="calc-v2-nav" id="calc-nav"></div>
  <main class="wosky-main" id="app"></main>

  <script src="../js/data/gear-data.js"></script>
  <script src="../js/character.js"></script>
  <script src="../js/char-bar.js"></script>
  <script src="data/config.js"></script>
  <script src="calc-nav.js"></script>
  <script>
(function () {
  'use strict';
  var SK  = 'wosky_v2_player';
  var FOLD_KEY = 'wosky_v2_troop_fold';
  var CFG = WOSKY_V2_CONFIG;
  var gi, pi;

  function getFolds() {
    try { return JSON.parse(localStorage.getItem(FOLD_KEY)) || {}; } catch (e) { return {}; }
  }
  function saveFolds(f) {
    try { localStorage.setItem(FOLD_KEY, JSON.stringify(f)); } catch (e) {}
  }

  /* ── State ────────────────────────────────────────────────────────────── */
  function loadState() {
    try {
      var raw = localStorage.getItem(SK);
      if (raw) {
        var s = JSON.parse(raw);
        var gear = s.gear || deepCopy(CFG.defaults.gear);
        var gearActive = s.gearActive || {};
        ensureActive(gear, gearActive);
        return { gear: gear, gearActive: gearActive };
      }
    } catch (e) {}
    var g = deepCopy(CFG.defaults.gear);
    var ga = {};
    ensureActive(g, ga);
    return { gear: g, gearActive: ga };
  }
  function ensureActive(gear, gearActive) {
    var all = ['chest','legs','ring','offhand','helm','neck'];
    for (var i = 0; i < all.length; i++) {
      if (typeof gearActive[all[i]] === 'undefined') gearActive[all[i]] = false;
    }
  }
  function saveState() {
    try {
      var raw = localStorage.getItem(SK);
      var full = raw ? JSON.parse(raw) : {};
      full.gear = state.gear;
      full.gearActive = state.gearActive;
      localStorage.setItem(SK, JSON.stringify(full));
    } catch (e) {}
  }
  function deepCopy(o) { return JSON.parse(JSON.stringify(o)); }
  function fmt(n)  { return (n || 0).toLocaleString(); }
  function cap(s)  { return s.charAt(0).toUpperCase() + s.slice(1); }

  var state = loadState();

  /* Tier options — disabled option separators instead of optgroups (fixes blue triangles) */
  function tierOpts(sel, includeNoTarget) {
    var html = includeNoTarget
      ? '<option value="no-target"' + (sel === 'no-target' ? ' selected' : '') + '>— No Target —</option>'
      : '';
    var costs = WOSKY_GEAR_DATA.costs;
    var lastColor = null;
    for (var i = 1; i < costs.length; i++) {
      var c = costs[i];
      var color = c.id.replace(/-.*/, '');
      if (color !== lastColor) {
        html += '<option disabled class="opt-sep">── ' + color.charAt(0).toUpperCase() + color.slice(1) + ' ──</option>';
        lastColor = color;
      }
      var s = (c.id === sel) ? ' selected' : '';
      html += '<option value="' + c.id + '"' + s + '>' + c.label + '</option>';
    }
    return html;
  }

  function gearCost(piece) {
    if (!state.gearActive[piece]) return null;
    var g = state.gear[piece];
    if (g.tgt === 'no-target') return null;
    try {
      return WOSKY_GEAR_DATA.calcRange(WOSKY_GEAR_DATA.getIndexById(g.cur), WOSKY_GEAR_DATA.getIndexById(g.tgt));
    } catch (e) { return { a: 0, s: 0, d: 0, m: 0 }; }
  }

  /* ── Render ───────────────────────────────────────────────────────────── */
  function render() {
    var html = '';
    var folds = getFolds();

    html += '<div class="wm-header">' +
      '<div class="wm-logo">W<span>M</span></div>' +
      '<div class="wm-title-block">' +
        '<div class="wm-title">Chief Gear</div>' +
        '<div class="wm-sub">WOSKY_3169 &middot; WarMachine &middot; State 3169</div>' +
      '</div>' +
      '<div class="wm-badges">' +
        '<span class="wm-badge wm-badge-red">3169</span>' +
        '<span class="wm-badge wm-badge-sky">SKY Breakers</span>' +
      '</div>' +
    '</div>';

    /* Quick Select — All Pieces */
    html += '<div class="global-controls">' +
      '<div class="global-controls-title">&#9881; Quick Select — All Pieces</div>' +
      '<div class="global-row">' +
        '<span class="global-row-label">Set All</span>' +
        '<div class="global-field"><span class="global-field-label">Current</span>' +
          '<select class="g-select" id="gl-all-cur">' + tierOpts('pink-t1', false) + '</select></div>' +
        '<button class="wbtn-xs secondary" data-gc="set-cur" data-scope="all">Set Current</button>' +
        '<span class="g-divider">&mdash;</span>' +
        '<div class="global-field"><span class="global-field-label">Target</span>' +
          '<select class="g-select" id="gl-all-tgt">' + tierOpts('no-target', true) + '</select></div>' +
        '<button class="wbtn-xs" data-gc="set-tgt" data-scope="all">Set Target</button>' +
      '</div>' +
    '</div>';

    /* Troop sections */
    var groups = CFG.groups;
    for (gi = 0; gi < groups.length; gi++) {
      var group  = groups[gi];
      var pieces = CFG.pieces[group];
      var isCollapsed = folds[group] ? ' collapsed' : '';

      html += '<div class="troop-block ' + group + isCollapsed + '" id="troop-' + group + '">';

      html += '<div class="troop-block-header">' +
        '<span class="troop-block-title">' + cap(group) + '</span>' +
        '<span class="troop-block-total" id="group-total-' + group + '"></span>' +
        '<button class="troop-collapse-btn" data-tc="' + group + '">' + (folds[group] ? '&#9658;' : '&#9660;') + '</button>' +
      '</div>';

      html += '<div class="troop-setter">' +
        '<span class="troop-setter-label">Set ' + cap(group) + '</span>' +
        '<div class="global-field"><span class="global-field-label">Current</span>' +
          '<select class="g-select" id="gl-' + group + '-cur">' + tierOpts('pink-t1', false) + '</select></div>' +
        '<button class="wbtn-xs secondary" data-gc="set-cur" data-scope="' + group + '">Set Current</button>' +
        '<span class="g-divider">&mdash;</span>' +
        '<div class="global-field"><span class="global-field-label">Target</span>' +
          '<select class="g-select" id="gl-' + group + '-tgt">' + tierOpts('no-target', true) + '</select></div>' +
        '<button class="wbtn-xs" data-gc="set-tgt" data-scope="' + group + '">Set Target</button>' +
      '</div>';

      /* 2-column piece card grid */
      html += '<div class="piece-grid">';
      for (pi = 0; pi < pieces.length; pi++) {
        var piece = pieces[pi];
        var g     = state.gear[piece];
        var active = !!state.gearActive[piece];
        html += '<div class="piece-card">';
        html += '<div class="piece-card-header">' +
          '<span class="piece-card-name">' + cap(piece) + '</span>' +
          '<span class="troop-badge ' + group + '">' + cap(group) + '</span>' +
          '<label class="piece-active-toggle">' +
            '<input type="checkbox" class="piece-active-cb" data-pa="' + piece + '"' + (active ? ' checked' : '') + '>' +
            '<span class="piece-active-track"></span>' +
            '<span class="piece-active-label">Target</span>' +
          '</label>' +
        '</div>';
        html += '<div class="piece-card-body">';
        html += '<div class="gear-row">' +
          '<div class="gear-select-wrap"><select class="t-select" data-gear="' + piece + '" data-f="cur">' + tierOpts(g.cur, false) + '</select></div>' +
          '<span class="gear-row-sep">&#8250;</span>';
        if (active) {
          html += '<div class="gear-select-wrap"><select class="t-select" data-gear="' + piece + '" data-f="tgt">' + tierOpts(g.tgt, false) + '</select></div>';
        } else {
          html += '<div class="gear-select-wrap"><span class="piece-no-target">No target</span></div>';
        }
        html += '</div>';
        html += '<div class="gear-cost-strip" id="gcs-' + piece + '"><span class="gcs-zero">—</span></div>';
        html += '</div></div>';
      }
      html += '</div>'; /* piece-grid */
      html += '</div>'; /* troop-block */
    }

    html += '<div class="grand-strip" id="grand-strip"><span class="grand-strip-label">&#9876; Grand Total</span></div>';

    document.getElementById('app').innerHTML = html;
    attachListeners(); calc();
  }

  /* ── Calc ─────────────────────────────────────────────────────────────── */
  function calc() {
    var grand  = { a: 0, s: 0, d: 0, m: 0 };
    var groups = CFG.groups;
    for (gi = 0; gi < groups.length; gi++) {
      var group  = groups[gi];
      var pieces = CFG.pieces[group];
      var gt     = { a: 0, s: 0, d: 0, m: 0 };
      for (pi = 0; pi < pieces.length; pi++) {
        var piece = pieces[pi];
        var r = gearCost(piece);
        var a = r ? (r.a||0) : 0;
        var s = r ? (r.s||0) : 0;
        var d = r ? (r.d||0) : 0;
        var m = r ? (r.m||0) : 0;
        var strip = document.getElementById('gcs-' + piece);
        if (strip) {
          if (!a && !s && !d && !m) {
            strip.innerHTML = '<span class="gcs-zero">—</span>';
          } else {
            var parts = [];
            if (a) parts.push(gcsItem('Alloy', a));
            if (s) parts.push(gcsItem('Polish', s));
            if (d) parts.push(gcsItem('Plans', d));
            if (m) parts.push(gcsItem('Amber', m));
            strip.innerHTML = parts.join('');
          }
        }
        gt.a+=a; gt.s+=s; gt.d+=d; gt.m+=m;
        grand.a+=a; grand.s+=s; grand.d+=d; grand.m+=m;
      }
      var tel = document.getElementById('group-total-' + group);
      if (tel) tel.innerHTML = 'A: ' + fmt(gt.a) + ' &nbsp; P: ' + fmt(gt.s) + ' &nbsp; Pl: ' + fmt(gt.d) + (gt.m ? ' &nbsp; Am: ' + fmt(gt.m) : '');
    }
    var gs = document.getElementById('grand-strip');
    if (gs) gs.innerHTML = '<span class="grand-strip-label">&#9876; Grand Total</span>' +
      gStat('Alloy', grand.a) + gStat('Polish', grand.s) + gStat('Plans', grand.d) + (grand.m ? gStat('Amber', grand.m) : '');
  }

  function gcsItem(k, v) {
    return '<span class="gcs-item"><span class="gcs-label">' + k + '</span> ' + fmt(v) + '</span>';
  }
  function gStat(k, v) {
    return '<div class="grand-stat"><span class="grand-stat-key">' + k + '</span><span class="grand-stat-val">' + fmt(v) + '</span></div>';
  }

  /* ── Listeners ────────────────────────────────────────────────────────── */
  function attachListeners() {
    var sels = document.querySelectorAll('[data-gear]');
    for (var i = 0; i < sels.length; i++) sels[i].addEventListener('change', onCellSelect);
    var btns = document.querySelectorAll('[data-gc]');
    for (var bi = 0; bi < btns.length; bi++) btns[bi].addEventListener('click', onGlobalBtn);
    var cbs = document.querySelectorAll('[data-pa]');
    for (var ci = 0; ci < cbs.length; ci++) cbs[ci].addEventListener('change', onActiveToggle);
    var tcbs = document.querySelectorAll('[data-tc]');
    for (var ti = 0; ti < tcbs.length; ti++) tcbs[ti].addEventListener('click', onCollapseToggle);
  }

  function onCellSelect() {
    state.gear[this.getAttribute('data-gear')][this.getAttribute('data-f')] = this.value;
    saveState(); calc();
  }

  function onActiveToggle() {
    var piece = this.getAttribute('data-pa');
    state.gearActive[piece] = this.checked;
    saveState(); render();
  }

  function onCollapseToggle() {
    var g = this.getAttribute('data-tc');
    var block = document.getElementById('troop-' + g);
    var folds = getFolds();
    var nowCollapsed = block.classList.contains('collapsed');
    if (nowCollapsed) { block.classList.remove('collapsed'); folds[g] = false; }
    else              { block.classList.add('collapsed');    folds[g] = true; }
    this.innerHTML = folds[g] ? '&#9658;' : '&#9660;';
    saveFolds(folds);
  }

  function onGlobalBtn() {
    var action = this.getAttribute('data-gc');
    var scope  = this.getAttribute('data-scope');
    var field  = (action === 'set-tgt') ? 'tgt' : 'cur';
    var val    = document.getElementById('gl-' + scope + '-' + field).value;
    if (!val) return;
    var pieces = (scope === 'all') ? ['chest','legs','ring','offhand','helm','neck'] : (CFG.pieces[scope] || []);
    if (action === 'set-tgt' && val === 'no-target') {
      for (var i = 0; i < pieces.length; i++) state.gearActive[pieces[i]] = false;
    } else {
      for (var i = 0; i < pieces.length; i++) {
        state.gear[pieces[i]][field] = val;
        if (action === 'set-tgt') state.gearActive[pieces[i]] = true;
      }
    }
    saveState(); render();
  }

  render();
}());
  </script>
</body>
</html>
