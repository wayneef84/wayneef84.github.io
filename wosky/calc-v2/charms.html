<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chief Charms — WOSKY_3169 Calc v2</title>
  <link rel="stylesheet" href="../css/wosky.css">
  <link rel="stylesheet" href="calc-v2.css">
</head>
<body>
  <nav class="wosky-nav">
    <a href="../../index.html" class="wosky-nav-home">&#8592; Hub</a>
    <span class="wosky-nav-sep">/</span>
    <a href="../index.html" class="wosky-nav-home">WOSKY_3169</a>
    <span class="wosky-nav-sep">/</span>
    <a href="index.html" class="wosky-nav-home">Calc v2</a>
    <span class="wosky-nav-sep">/</span>
    <span class="wosky-nav-brand">&#10024; Chief Charms</span>
  </nav>
  <div id="wosky-char-bar"></div>
  <div class="calc-v2-nav" id="calc-nav"></div>
  <main class="wosky-main" id="app"></main>

  <script src="../js/data/charms-data.js"></script>
  <script src="../js/character.js"></script>
  <script src="../js/char-bar.js"></script>
  <script src="data/config.js"></script>
  <script src="calc-nav.js"></script>
  <script>
(function () {
  'use strict';
  var SK  = 'wosky_v2_player';
  var FOLD_KEY = 'wosky_v2_troop_fold';
  var CFG = WOSKY_V2_CONFIG;
  var ML  = CFG.charms.maxLevel;
  var MS  = CFG.charms.maxStep;

  function getFolds() {
    try { return JSON.parse(localStorage.getItem(FOLD_KEY)) || {}; } catch (e) { return {}; }
  }
  function saveFolds(f) {
    try { localStorage.setItem(FOLD_KEY, JSON.stringify(f)); } catch (e) {}
  }

  /* ── Charm tier color bands ───────────────────────────────────────────── */
  var TIERS = [
    { name: 'Green',  cls: 'tier-green',  start: 1,  end: 5  },
    { name: 'Blue',   cls: 'tier-blue',   start: 6,  end: 10 },
    { name: 'Purple', cls: 'tier-purple', start: 11, end: 15 },
    { name: 'Gold',   cls: 'tier-gold',   start: 16, end: 20 }
  ];

  function tierFor(l) {
    for (var i = 0; i < TIERS.length; i++) {
      if (l >= TIERS[i].start && l <= TIERS[i].end) return TIERS[i];
    }
    return TIERS[0];
  }

  /* Charm options — format: "Lv6.3 (Blue)" */
  function charmOpts(selL, selS) {
    var html = '';
    for (var ti = 0; ti < TIERS.length; ti++) {
      var t = TIERS[ti];
      html += '<option disabled class="opt-sep">── ' + t.name + ' ──</option>';
      for (var l = t.start; l <= t.end; l++) {
        for (var s = 0; s <= MS; s++) {
          var sel = (l === selL && s === selS) ? ' selected' : '';
          html += '<option value="' + l + ':' + s + '"' + sel + '>' +
                  'Lv' + l + '.' + s + ' (' + t.name + ')</option>';
        }
      }
    }
    return html;
  }

  /* ── State ────────────────────────────────────────────────────────────── */
  function loadState() {
    try {
      var raw = localStorage.getItem(SK);
      if (raw) {
        var s = JSON.parse(raw);
        var charms       = s.charms       || deepCopy(CFG.defaults.charms);
        var charmTargets = s.charmTargets || deepCopy(CFG.defaults.charmTargets);
        var charmActive  = s.charmActive  || {};
        ensureActive(charmActive);
        return { charms: charms, charmTargets: charmTargets, charmActive: charmActive };
      }
    } catch (e) {}
    var ca = {};
    ensureActive(ca);
    return {
      charms:       deepCopy(CFG.defaults.charms),
      charmTargets: deepCopy(CFG.defaults.charmTargets),
      charmActive:  ca
    };
  }

  function ensureActive(ca) {
    var pieces = ['chest','legs','ring','offhand','helm','neck'];
    for (var i = 0; i < pieces.length; i++) {
      if (typeof ca[pieces[i]] === 'undefined') ca[pieces[i]] = true;
    }
  }

  function saveState() {
    try {
      var raw  = localStorage.getItem(SK);
      var full = raw ? JSON.parse(raw) : {};
      full.charms       = state.charms;
      full.charmTargets = state.charmTargets;
      full.charmActive  = state.charmActive;
      localStorage.setItem(SK, JSON.stringify(full));
    } catch (e) {}
  }

  function deepCopy(o) { return JSON.parse(JSON.stringify(o)); }
  function fmt(n)  { return (n || 0).toLocaleString(); }
  function cap(s)  { return s.charAt(0).toUpperCase() + s.slice(1); }
  function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }

  var state = loadState();

  function charmCost(piece, slot) {
    if (!state.charmActive[piece]) return null;
    var cur = state.charms[piece][slot];
    var tgt = state.charmTargets[piece][slot];
    try { return WOSKY_CHARMS_DATA.calcRange(cur.l, cur.s, tgt.l, tgt.s); }
    catch (e) { return { d: 0, g: 0, s: 0, svs_pts: 0 }; }
  }

  /* ── Render ───────────────────────────────────────────────────────────── */
  function render() {
    var html = '';
    var gi, pi, ci;
    var folds = getFolds();

    html += '<div class="wm-header">' +
      '<div class="wm-logo">W<span>M</span></div>' +
      '<div class="wm-title-block">' +
        '<div class="wm-title">Chief Charms</div>' +
        '<div class="wm-sub">WOSKY_3169 &middot; WarMachine &middot; State 3169</div>' +
      '</div>' +
      '<div class="wm-badges">' +
        '<span class="wm-badge wm-badge-red">3169</span>' +
        '<span class="wm-badge wm-badge-sky">SKY Breakers</span>' +
      '</div>' +
    '</div>';

    /* Tier legend */
    html += '<div class="tier-legend">' +
      '<span class="tier-legend-label">Tier key:</span>' +
      '<span class="tier-pip tier-green">Green Lv1-5</span>' +
      '<span class="tier-pip tier-blue">Blue Lv6-10</span>' +
      '<span class="tier-pip tier-purple">Purple Lv11-15</span>' +
      '<span class="tier-pip tier-gold">Gold Lv16-20</span>' +
    '</div>';

    /* Quick Select — All Pieces (level-only, no tier sub-grouping) */
    html += '<div class="global-controls">' +
      '<div class="global-controls-title">&#9881; Quick Select — All Pieces</div>' +
      '<div class="global-row">' +
        '<span class="global-row-label">Set All</span>' +
        '<div class="global-field"><span class="global-field-label">Current</span>' +
          '<select class="g-select charm-select" id="gl-all-cur">' + charmOpts(10, 3) + '</select></div>' +
        '<button class="wbtn-xs secondary" data-gc="set-cur" data-scope="all">Set Current</button>' +
        '<span class="g-divider">&mdash;</span>' +
        '<div class="global-field"><span class="global-field-label">Target</span>' +
          '<select class="g-select charm-select" id="gl-all-tgt">' + charmOpts(11, 0) + '</select></div>' +
        '<button class="wbtn-xs" data-gc="set-tgt" data-scope="all">Set Target</button>' +
      '</div>' +
    '</div>';

    /* Troop sections */
    var groups = CFG.groups;
    for (gi = 0; gi < groups.length; gi++) {
      var group  = groups[gi];
      var pieces = CFG.pieces[group];
      var isCollapsed = folds[group] ? ' collapsed' : '';

      html += '<div class="troop-block ' + group + isCollapsed + '" id="troop-' + group + '">';
      html += '<div class="troop-block-header">' +
        '<span class="troop-block-title">' + cap(group) + '</span>' +
        '<span class="troop-block-total" id="group-total-' + group + '"></span>' +
        '<button class="troop-collapse-btn" data-tc="' + group + '">' + (folds[group] ? '&#9658;' : '&#9660;') + '</button>' +
      '</div>';

      /* Per-troop setter */
      html += '<div class="troop-setter">' +
        '<span class="troop-setter-label">Set ' + cap(group) + '</span>' +
        '<div class="global-field"><span class="global-field-label">Current</span>' +
          '<select class="g-select charm-select" id="gl-' + group + '-cur">' + charmOpts(10, 3) + '</select></div>' +
        '<button class="wbtn-xs secondary" data-gc="set-cur" data-scope="' + group + '">Set Current</button>' +
        '<span class="g-divider">&mdash;</span>' +
        '<div class="global-field"><span class="global-field-label">Target</span>' +
          '<select class="g-select charm-select" id="gl-' + group + '-tgt">' + charmOpts(11, 0) + '</select></div>' +
        '<button class="wbtn-xs" data-gc="set-tgt" data-scope="' + group + '">Set Target</button>' +
      '</div>';

      /* 2-col piece card grid */
      html += '<div class="piece-grid">';
      for (pi = 0; pi < pieces.length; pi++) {
        var piece  = pieces[pi];
        var active = !!state.charmActive[piece];
        html += '<div class="piece-card">';
        html += '<div class="piece-card-header">' +
          '<span class="piece-card-name">' + cap(piece) + '</span>' +
          '<span class="troop-badge ' + group + '">' + cap(group) + '</span>' +
          '<label class="piece-active-toggle">' +
            '<input type="checkbox" class="piece-active-cb" data-pa="' + piece + '"' + (active ? ' checked' : '') + '>' +
            '<span class="piece-active-track"></span>' +
            '<span class="piece-active-label">Target</span>' +
          '</label>' +
        '</div>';
        html += '<div class="piece-card-body charm-card-body">';

        if (!active) {
          html += '<div class="piece-no-target" style="margin:0.5rem 0">No target — all charm slots excluded</div>';
        } else {
          for (ci = 1; ci <= CFG.charms.charmsPerPiece; ci++) {
            var slot = 'c' + ci;
            var cur  = state.charms[piece][slot];
            var tgt  = state.charmTargets[piece][slot];
            var curT = tierFor(cur.l);
            var tgtT = tierFor(tgt.l);

            html += '<div class="charm-slot-row">' +
              '<span class="slot-pill slot-' + ci + '">' + slot.toUpperCase() + '</span>' +
              '<div class="charm-select-wrap">' +
                '<div class="charm-tier-wrap ' + curT.cls + '">' +
                  '<select class="t-select" data-p="' + piece + '" data-c="' + slot + '" data-f="cur">' +
                  charmOpts(cur.l, cur.s) + '</select>' +
                '</div>' +
              '</div>' +
              '<span class="gear-row-sep">&#8250;</span>' +
              '<div class="charm-select-wrap">' +
                '<div class="charm-tier-wrap ' + tgtT.cls + '">' +
                  '<select class="t-select" data-p="' + piece + '" data-c="' + slot + '" data-f="tgt">' +
                  charmOpts(tgt.l, tgt.s) + '</select>' +
                '</div>' +
              '</div>' +
            '</div>';

            html += '<div class="charm-slot-costs" id="csc-' + piece + '-' + slot + '">' +
              '<span class="csc-zero">—</span>' +
            '</div>';
          }
        }
        html += '</div></div>'; /* piece-card-body + piece-card */
      }
      html += '</div></div>'; /* piece-grid + troop-block */
    }

    html += '<div class="grand-strip" id="grand-strip"><span class="grand-strip-label">&#9876; Grand Total</span></div>';

    document.getElementById('app').innerHTML = html;
    attachListeners();
    calc();
  }

  /* ── Calc ─────────────────────────────────────────────────────────────── */
  function calc() {
    var gi, pi, ci;
    var grand  = { d: 0, g: 0, s: 0, pts: 0 };
    var groups = CFG.groups;
    for (gi = 0; gi < groups.length; gi++) {
      var group  = groups[gi];
      var pieces = CFG.pieces[group];
      var gt     = { d: 0, g: 0, s: 0, pts: 0 };
      for (pi = 0; pi < pieces.length; pi++) {
        var piece = pieces[pi];
        if (!state.charmActive[piece]) continue;
        for (ci = 1; ci <= CFG.charms.charmsPerPiece; ci++) {
          var slot = 'c' + ci;
          var r    = charmCost(piece, slot);
          var d = r ? (r.d||0) : 0;
          var g = r ? (r.g||0) : 0;
          var sv = r ? (r.s||0) : 0;
          var pts = r ? (r.svs_pts||0) : 0;
          var strip = document.getElementById('csc-' + piece + '-' + slot);
          if (strip) {
            if (!d && !g && !sv && !pts) {
              strip.innerHTML = '<span class="csc-zero">—</span>';
            } else {
              var parts = [];
              if (d)   parts.push(cscItem('Designs', d));
              if (g)   parts.push(cscItem('Guides', g));
              if (sv)  parts.push(cscItem('Secrets', sv));
              if (pts) parts.push(cscItem('SvS', pts));
              strip.innerHTML = parts.join('');
            }
          }
          gt.d+=d; gt.g+=g; gt.s+=sv; gt.pts+=pts;
          grand.d+=d; grand.g+=g; grand.s+=sv; grand.pts+=pts;
        }
      }
      var tel = document.getElementById('group-total-' + group);
      if (tel) tel.innerHTML = 'D: ' + fmt(gt.d) + ' &nbsp; G: ' + fmt(gt.g) +
        (gt.s ? ' &nbsp; S: ' + fmt(gt.s) : '') + ' &nbsp;&mdash;&nbsp; ' + fmt(gt.pts) + ' pts';
    }
    var gs = document.getElementById('grand-strip');
    if (gs) gs.innerHTML = '<span class="grand-strip-label">&#9876; Grand Total</span>' +
      gStat('Designs', grand.d) + gStat('Guides', grand.g) +
      (grand.s ? gStat('Secrets', grand.s) : '') + gStat('SvS Pts', grand.pts);
  }

  function cscItem(k, v) {
    return '<span class="csc-item"><span class="csc-label">' + k + ':</span> ' + fmt(v) + '</span>';
  }
  function gStat(k, v) {
    return '<div class="grand-stat"><span class="grand-stat-key">' + k + '</span><span class="grand-stat-val">' + fmt(v) + '</span></div>';
  }

  /* ── Listeners ────────────────────────────────────────────────────────── */
  function attachListeners() {
    var sels = document.querySelectorAll('[data-p]');
    for (var i = 0; i < sels.length; i++) sels[i].addEventListener('change', onCellSelect);
    var btns = document.querySelectorAll('[data-gc]');
    for (var bi = 0; bi < btns.length; bi++) btns[bi].addEventListener('click', onGlobalBtn);
    var cbs = document.querySelectorAll('[data-pa]');
    for (var ci = 0; ci < cbs.length; ci++) cbs[ci].addEventListener('change', onActiveToggle);
    var tcbs = document.querySelectorAll('[data-tc]');
    for (var ti = 0; ti < tcbs.length; ti++) tcbs[ti].addEventListener('click', onCollapseToggle);
  }

  function parseLvl(val) {
    var parts = (val || '').split(':');
    return {
      l: clamp(parseInt(parts[0]) || 1, 1, ML),
      s: clamp(parseInt(parts[1]) || 0, 0, MS)
    };
  }

  function onCellSelect() {
    var piece = this.getAttribute('data-p');
    var slot  = this.getAttribute('data-c');
    var field = this.getAttribute('data-f');
    var ls    = parseLvl(this.value);
    /* Update tier stripe */
    this.parentNode.className = 'charm-tier-wrap ' + tierFor(ls.l).cls;
    if (field === 'cur') { state.charms[piece][slot].l = ls.l; state.charms[piece][slot].s = ls.s; }
    else { state.charmTargets[piece][slot].l = ls.l; state.charmTargets[piece][slot].s = ls.s; }
    saveState(); calc();
  }

  function onActiveToggle() {
    var piece = this.getAttribute('data-pa');
    state.charmActive[piece] = this.checked;
    saveState(); render();
  }

  function onCollapseToggle() {
    var g = this.getAttribute('data-tc');
    var block = document.getElementById('troop-' + g);
    var folds = getFolds();
    var nowCollapsed = block.classList.contains('collapsed');
    if (nowCollapsed) { block.classList.remove('collapsed'); folds[g] = false; }
    else              { block.classList.add('collapsed');    folds[g] = true; }
    this.innerHTML = folds[g] ? '&#9658;' : '&#9660;';
    saveFolds(folds);
  }

  function onGlobalBtn() {
    var action = this.getAttribute('data-gc');
    var scope  = this.getAttribute('data-scope');
    var field  = (action === 'set-tgt') ? 'tgt' : 'cur';
    var ls     = parseLvl(document.getElementById('gl-' + scope + '-' + field).value);
    var pieces = (scope === 'all')
      ? ['chest','legs','ring','offhand','helm','neck']
      : (CFG.pieces[scope] || []);
    for (var pi = 0; pi < pieces.length; pi++) {
      var piece = pieces[pi];
      for (var ci = 1; ci <= CFG.charms.charmsPerPiece; ci++) {
        var slot = 'c' + ci;
        if (action === 'set-tgt') state.charmTargets[piece][slot] = { l: ls.l, s: ls.s };
        else                      state.charms[piece][slot]       = { l: ls.l, s: ls.s };
      }
    }
    saveState(); render();
  }

  render();
}());
  </script>
</body>
</html>
