<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plan — WOSKY_3169 Calc v2</title>
  <link rel="stylesheet" href="../css/wosky.css">
  <link rel="stylesheet" href="calc-v2.css">
  <style>
    .mat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 0.75rem;
      margin: 0.75rem 0 1.25rem;
    }
    .mat-card {
      padding: 0.85rem;
      background: var(--w-surface2);
      border: 1px solid var(--w-border);
      border-radius: var(--w-radius-md);
    }
    .mat-card .mat-lbl {
      font-family: var(--w-mono);
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--w-text-secondary);
      margin-bottom: 0.4rem;
    }
    .mat-card .mat-hint {
      font-size: 0.62rem;
      color: var(--w-text-muted);
      margin-top: 0.25rem;
    }
    .mat-card input { width: 100%; }
    .svs-day {
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
      padding: 0.85rem 1rem;
      border-left: 3px solid var(--w-red);
      background: var(--w-surface2);
      border-radius: 0 var(--w-radius-md) var(--w-radius-md) 0;
      margin-bottom: 0.6rem;
    }
    .svs-day-num {
      font-family: var(--w-mono);
      font-size: 1.1rem;
      font-weight: 900;
      color: var(--w-red);
      opacity: 0.35;
      flex-shrink: 0;
      line-height: 1;
      padding-top: 2px;
    }
    .svs-day-body {}
    .svs-day-focus {
      font-family: var(--w-mono);
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--w-text);
      margin-bottom: 2px;
    }
    .svs-day-tip { font-size: 0.78rem; color: var(--w-text-secondary); line-height: 1.5; }
  </style>
</head>
<body>
  <nav class="wosky-nav">
    <a href="../../index.html" class="wosky-nav-home">&#8592; Hub</a>
    <span class="wosky-nav-sep">/</span>
    <a href="../index.html" class="wosky-nav-home">WOSKY_3169</a>
    <span class="wosky-nav-sep">/</span>
    <a href="index.html" class="wosky-nav-home">Calc v2</a>
    <span class="wosky-nav-sep">/</span>
    <span class="wosky-nav-brand">&#128203; Plan</span>
  </nav>
  <div id="wosky-char-bar"></div>
  <div class="calc-v2-nav" id="calc-nav"></div>
  <main class="wosky-main" id="app"></main>

  <script src="../js/character.js"></script>
  <script src="../js/char-bar.js"></script>
  <script src="data/config.js"></script>
  <script src="calc-nav.js"></script>
  <script>
(function () {
  'use strict';
  var SK  = 'wosky_v2_player';
  var CFG = WOSKY_V2_CONFIG;

  function loadMats() {
    try {
      var raw = localStorage.getItem(SK);
      if (raw) {
        var s = JSON.parse(raw);
        return s.mats || JSON.parse(JSON.stringify(CFG.defaults.mats));
      }
    } catch (e) {}
    return JSON.parse(JSON.stringify(CFG.defaults.mats));
  }

  function saveMats(mats) {
    try {
      var raw  = localStorage.getItem(SK);
      var full = raw ? JSON.parse(raw) : {};
      full.mats = mats;
      localStorage.setItem(SK, JSON.stringify(full));
    } catch (e) {}
  }

  var mats = loadMats();

  var MAT_DEFS = [
    ['charm_designs',  'Charm Designs',  null],
    ['charm_guides',   'Charm Guides',   null],
    ['charm_secrets',  'Charm Secrets',  null],
    ['alloy',          'Alloy',          null],
    ['polish',         'Polish',         null],
    ['plans',          'Plans',          null],
    ['amber',          'Amber',          null],
    ['gear_chests',    'Gear Chests',    '400 Alloy + 4 Polish + 1 Plan each'],
    ['hero_xp',        'Hero XP',        null],
    ['mithril',        'Mithril',        '&#9888; Hard resource'],
    ['mythic_gear',    'Mythic Gear',    null],
    ['essence_stones', 'Essence Stones', null]
  ];

  function render() {
    var html = '';

    html += '<div class="wm-header">' +
      '<div class="wm-logo">W<span>M</span></div>' +
      '<div class="wm-title-block">' +
        '<div class="wm-title">Plan &amp; Materials</div>' +
        '<div class="wm-sub">WOSKY_3169 &middot; WarMachine &middot; State 3169 &middot; SKY Breakers</div>' +
      '</div>' +
    '</div>';

    html += '<div class="w-card">';
    html += '<div class="w-card-title">Your Material Stockpile</div>';
    html += '<p style="font-size:0.78rem;color:var(--w-text-secondary);margin:0 0 0.75rem">Shared across all Calc v2 calculators. Update after each session.</p>';
    html += '<div class="mat-grid">';
    for (var i = 0; i < MAT_DEFS.length; i++) {
      var d = MAT_DEFS[i];
      html += '<div class="mat-card">' +
        '<div class="mat-lbl">' + d[1] + '</div>' +
        '<input class="w-input w-input-wide" type="number" min="0" data-mat="' + d[0] + '" value="' + ((mats[d[0]] || 0).toLocaleString()).replace(/,/g,'') + '">' +
        (d[2] ? '<div class="mat-hint">' + d[2] + '</div>' : '') +
      '</div>';
    }
    html += '</div></div>';

    html += '<div class="w-card">';
    html += '<div class="w-card-title">SvS Day Guide</div>';
    var days = CFG.svsDays;
    for (var d2 = 0; d2 < days.length; d2++) {
      var day = days[d2];
      html += '<div class="svs-day">' +
        '<div class="svs-day-num">' + (d2 + 1) + '</div>' +
        '<div class="svs-day-body">' +
          '<div class="svs-day-focus">' + day.day + ': ' + day.focus + '</div>' +
          '<div class="svs-day-tip">' + day.tip + '</div>' +
        '</div>' +
      '</div>';
    }
    html += '</div>';

    document.getElementById('app').innerHTML = html;

    var inputs = document.querySelectorAll('[data-mat]');
    for (var ii = 0; ii < inputs.length; ii++) {
      inputs[ii].addEventListener('change', function () {
        mats[this.getAttribute('data-mat')] = parseInt(this.value) || 0;
        saveMats(mats);
      });
    }
  }

  render();
}());
  </script>
</body>
</html>
