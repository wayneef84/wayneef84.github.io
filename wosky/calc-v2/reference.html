<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reference — WOSKY_3169 Calc v2</title>
  <link rel="stylesheet" href="../css/wosky.css">
  <link rel="stylesheet" href="calc-v2.css">
  <style>
    .ref-section { margin-bottom: 1.5rem; }
    .ref-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
    .ref-table th {
      font-family: var(--w-mono);
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--w-text-muted);
      padding: 0.45rem 0.75rem;
      text-align: left;
      background: var(--w-surface2);
      border-bottom: 1px solid var(--w-border);
    }
    .ref-table td {
      padding: 0.45rem 0.75rem;
      border-bottom: 1px solid var(--w-border);
      font-family: var(--w-mono);
      color: var(--w-text);
    }
    .ref-table tr:last-child td { border-bottom: none; }
    .ref-table tr:hover td { background: var(--w-surface2); }
    .ref-table td.hl { color: var(--w-red); font-weight: 700; }
    .ref-table td.dim { color: var(--w-text-muted); }
  </style>
</head>
<body>
  <nav class="wosky-nav">
    <a href="../../index.html" class="wosky-nav-home">&#8592; Hub</a>
    <span class="wosky-nav-sep">/</span>
    <a href="../index.html" class="wosky-nav-home">WOSKY_3169</a>
    <span class="wosky-nav-sep">/</span>
    <a href="index.html" class="wosky-nav-home">Calc v2</a>
    <span class="wosky-nav-sep">/</span>
    <span class="wosky-nav-brand">&#128218; Reference</span>
  </nav>
  <div id="wosky-char-bar"></div>
  <div class="calc-v2-nav" id="calc-nav"></div>
  <main class="wosky-main" id="app"></main>

  <script src="../js/data/charms-data.js"></script>
  <script src="../js/data/gear-data.js"></script>
  <script src="../js/data/hero-gear-data.js"></script>
  <script src="../js/character.js"></script>
  <script src="../js/char-bar.js"></script>
  <script src="data/config.js"></script>
  <script src="calc-nav.js"></script>
  <script>
(function () {
  'use strict';
  var CFG = WOSKY_V2_CONFIG;
  function fmt(n) { return (n || 0).toLocaleString(); }

  function render() {
    var app = document.getElementById('app');
    var html = '';

    html += '<div class="wm-header">' +
      '<div class="wm-logo">W<span>M</span></div>' +
      '<div class="wm-title-block">' +
        '<div class="wm-title">Reference Tables</div>' +
        '<div class="wm-sub">WOSKY_3169 &middot; WarMachine &middot; State 3169 &middot; SKY Breakers</div>' +
      '</div>' +
    '</div>';

    /* Empowerment Gates */
    html += '<div class="w-card ref-section"><div class="w-card-title">Empowerment Gates</div>';
    html += '<table class="ref-table"><thead><tr><th>Emp Range</th><th>Forge Required</th><th>Mithril</th><th>Mythic Gear</th></tr></thead><tbody>';
    var gates = CFG.hero.gates;
    for (var g = 0; g < gates.length; g++) {
      html += '<tr><td>' + gates[g][0] + '&ndash;' + gates[g][1] + '</td>' +
        '<td class="hl">F' + gates[g][2] + '</td>' +
        '<td>' + fmt(gates[g][3]) + '</td>' +
        '<td>' + fmt(gates[g][4]) + '</td></tr>';
    }
    html += '</tbody></table></div>';

    /* Piece assignments */
    html += '<div class="w-card ref-section"><div class="w-card-title">Piece Assignments</div>';
    html += '<table class="ref-table"><thead><tr><th>Troop Type</th><th>Chief Gear Pieces</th><th>Hero Pieces</th></tr></thead><tbody>';
    var groups = CFG.groups;
    for (var gi = 0; gi < groups.length; gi++) {
      var gr = groups[gi];
      html += '<tr>' +
        '<td class="hl" style="text-transform:capitalize">' + gr + '</td>' +
        '<td>' + CFG.pieces[gr].join(', ') + '</td>' +
        '<td>' + CFG.heroPieces.join(', ') + '</td>' +
      '</tr>';
    }
    html += '</tbody></table>';
    html += '<p style="font-size:0.72rem;color:var(--w-text-muted);margin:0.5rem 0 0">Edit assignments in <code>calc-v2/data/config.js</code></p>';
    html += '</div>';

    /* Charm costs per level */
    html += '<div class="w-card ref-section"><div class="w-card-title">Charm Cost Per Level</div>';
    html += '<table class="ref-table"><thead><tr><th>Upgrade</th><th>Designs</th><th>Guides</th><th>Secrets</th><th>SvS Pts</th></tr></thead><tbody>';
    for (var lv = 1; lv <= 16; lv++) {
      try {
        var r = WOSKY_CHARMS_DATA.calcRange(lv, 0, lv + 1, 0);
        html += '<tr><td class="hl">L' + lv + ' &rarr; ' + (lv + 1) + '</td>' +
          '<td>' + fmt(r.d) + '</td>' +
          '<td>' + fmt(r.g) + '</td>' +
          '<td>' + (r.s ? fmt(r.s) : '<span class="dim">—</span>') + '</td>' +
          '<td>' + fmt(r.svs_pts) + '</td></tr>';
      } catch (e) {
        html += '<tr><td class="hl">L' + lv + ' &rarr; ' + (lv + 1) + '</td><td colspan="4" class="dim">N/A</td></tr>';
      }
    }
    html += '</tbody></table></div>';

    /* Chief Gear tier costs */
    html += '<div class="w-card ref-section"><div class="w-card-title">Chief Gear Tier Costs (from Pink T1)</div>';
    html += '<table class="ref-table"><thead><tr><th>Tier</th><th>Alloy</th><th>Polish</th><th>Plans</th><th>Amber</th></tr></thead><tbody>';
    var tiers = CFG.gearTiers;
    try {
      var baseIdx = WOSKY_GEAR_DATA.getIndexById('pink-t1');
      for (var ti = 0; ti < tiers.length; ti++) {
        var t = tiers[ti];
        try {
          var tidx = WOSKY_GEAR_DATA.getIndexById(t.id);
          var tr = WOSKY_GEAR_DATA.calcRange(baseIdx, tidx);
          html += '<tr><td class="hl">' + t.label + '</td>' +
            '<td>' + fmt(tr.a) + '</td>' +
            '<td>' + fmt(tr.s) + '</td>' +
            '<td>' + fmt(tr.d) + '</td>' +
            '<td>' + (tr.m ? fmt(tr.m) : '<span class="dim">—</span>') + '</td></tr>';
        } catch (e2) {
          html += '<tr><td class="hl">' + t.label + '</td><td colspan="4" class="dim">—</td></tr>';
        }
      }
    } catch (e) {
      html += '<tr><td colspan="5" class="dim">Gear engine not loaded</td></tr>';
    }
    html += '</tbody></table></div>';

    /* SvS scoring */
    html += '<div class="w-card ref-section"><div class="w-card-title">SvS Scoring Reference</div>';
    html += '<table class="ref-table"><thead><tr><th>Activity</th><th>Points</th></tr></thead><tbody>';
    var score = [
      ['Charm upgrade (per level)',     '70 pts'],
      ['Chief Gear upgrade',            'Varies by tier gap'],
      ['Hero Gear forge level',         'Varies per level'],
      ['Hero Gear empower level',       'Varies per level'],
      ['Research (per % complete)',     'Varies by tree'],
      ['Building upgrade',              'Varies by level'],
      ['Experts (Sigils)',              '6,000 pts each'],
      ['Experts (Books of Knowledge)', '60 pts each']
    ];
    for (var si = 0; si < score.length; si++) {
      html += '<tr><td>' + score[si][0] + '</td><td class="hl">' + score[si][1] + '</td></tr>';
    }
    html += '</tbody></table></div>';

    app.innerHTML = html;
  }

  render();
}());
  </script>
</body>
</html>
