<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOS Upgrade Planner v3</title>
    <meta name="description" content="Personal Whiteout Survival toolkit for WarMachine · State 3169 · OTT Alliance.">
    <link rel="icon" href="../../favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-top">
                <div class="header-titles">
                    <div class="header-title">WOS UPGRADE PLANNER</div>
                    <div class="header-subtitle">UNIVERSAL BUILD CALCULATOR (v3)</div>
                </div>
                <button id="theme-toggle" class="theme-btn" title="Toggle Theme">🌓</button>
            </div>
        </header>

        <!-- Navigation Tabs -->
        <nav class="tabs-container">
            <button class="tab-btn active" data-tab="chief-gear" type="button">🛡️ Chief Gear</button>
            <button class="tab-btn" data-tab="charms" type="button">✨ Charms</button>
            <button class="tab-btn" data-tab="hero-gear" type="button">⚔️ Hero Gear</button>
            <button class="tab-btn" data-tab="plan" type="button">📋 Plan</button>
            <button class="tab-btn" data-tab="svs" type="button">🏆 SvS Scoring</button>
            <button class="tab-btn" data-tab="compare" type="button">⚖️ Compare</button>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Chief Gear Tab -->
            <section id="tab-chief-gear" class="tab-pane active">
                <div class="section-title">CHIEF GEAR MATERIALS</div>
                <div id="cg-materials" class="materials-grid"></div>
                <div id="cg-chest-opener" class="chest-opener-container"></div>
                <div class="section-title">GLOBAL TARGETS</div>
                <div id="cg-global-targets" class="global-targets-container"></div>
                <div class="section-title">GEAR UPGRADES</div>
                <div id="cg-upgrades" class="upgrades-list"></div>
            </section>

            <!-- Charms Tab -->
            <section id="tab-charms" class="tab-pane">
                <div class="section-title">CHARM MATERIALS</div>
                <div id="charm-materials" class="materials-grid"></div>
                <div class="section-title">GLOBAL TARGETS</div>
                <div id="charm-global-targets" class="global-targets-container"></div>
                <div class="section-title">CHARM UPGRADES</div>
                <div id="charm-upgrades" class="upgrades-list"></div>
            </section>

            <!-- Hero Gear Tab -->
            <section id="tab-hero-gear" class="tab-pane">
                <div class="section-title">HERO GEAR MATERIALS</div>
                <div id="hg-materials" class="materials-grid"></div>
                <div class="section-title">GLOBAL TARGETS</div>
                <div id="hg-global-targets" class="global-targets-container"></div>
                <div class="section-title">GEAR UPGRADES</div>
                <div id="hg-upgrades" class="upgrades-list"></div>
            </section>

            <!-- Plan Tab -->
            <section id="tab-plan" class="tab-pane">
                <div class="section-title">DYNAMIC PLAN SUMMARY</div>
                <div id="plan-summary" class="plan-summary-container"></div>
            </section>

            <!-- SvS Scoring Tab -->
            <section id="tab-svs" class="tab-pane">
                <div class="section-title">SVS SCORING ESTIMATES</div>
                <div id="svs-scoring" class="svs-scoring-container"></div>
            </section>

            <!-- Competitive Comparison Tab -->
            <section id="tab-compare" class="tab-pane">
                <div class="section-title">COMPETITIVE COMPARISON</div>
                <div id="compare-section" class="compare-container"></div>
            </section>
        </main>
    </div>

    <!-- Scripts -->
    <script src="./js/data.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
