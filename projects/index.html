<!DOCTYPE html>
<html lang="en" data-theme="pro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Projects - F.O.N.G. Arcade</title>
    <link rel="stylesheet" href="../css/components/global.css">
    <link rel="stylesheet" href="../css/components/card.css">
    <style>
        .projects-page-header {
            padding: 1.5rem 5% 0;
        }
        .projects-back {
            display: inline-block;
            font-size: 0.8rem;
            font-family: var(--font-mono);
            color: var(--text-muted);
            text-decoration: none;
            margin-bottom: 1.25rem;
            transition: color 0.2s;
        }
        .projects-back:hover { color: var(--text-secondary); }
        .projects-title {
            font-family: var(--font-display);
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 0.5px;
            margin: 0 0 0.25rem;
        }
        .projects-subtitle {
            font-size: 0.75rem;
            font-family: var(--font-mono);
            color: var(--text-muted);
            margin: 0 0 1.25rem;
        }
        .projects-grid-section {
            padding: 0 5% 3rem;
        }
    </style>
</head>
<body>

    <header class="global-nav">
        <a href="../index.html" class="nav-brand">F.O.N.G. ARCADE</a>
        <div class="nav-right">
            <a href="../index.html" class="theme-toggle-link">← Game Hub</a>
        </div>
    </header>

    <main>
        <div class="projects-page-header">
            <div class="library-header">
                <h2 class="library-title">Projects Hub</h2>
                <span id="project-count" class="library-count"></span>
            </div>
        </div>

        <section class="projects-grid-section">
            <div id="project-grid" class="game-grid" role="list"></div>
        </section>
    </main>

    <script src="../js/catalog.js"></script>
    <script>
        (function() {
            'use strict';

            var CATALOG = window.FONG_CATALOG || [];

            function catLabel(cat) {
                var labels = { card: 'Card', arcade: 'Arcade', puzzle: 'Puzzle', edu: 'Educational', project: 'Project' };
                return labels[cat] || cat;
            }

            function render() {
                var grid = document.getElementById('project-grid');
                var countEl = document.getElementById('project-count');
                if (!grid) return;

                var count = 0;
                grid.innerHTML = '';

                for (var i = 0; i < CATALOG.length; i++) {
                    var game = CATALOG[i];
                    if (game.category !== 'project') continue;

                    // Adjust href: catalog paths are relative to root (./projects/X)
                    // This page is inside /projects/, so strip the ./projects/ prefix
                    var href = game.href.replace('./projects/', './');

                    var badgeHtml = game.isNew ? '<span class="badge-new">NEW</span>' : '';

                    var card = document.createElement('a');
                    card.href = href;
                    card.className = 'game-card';
                    card.setAttribute('data-category', game.category);

                    card.innerHTML =
                        '<div class="card-top">' +
                            '<span class="card-icon">' + game.icon + '</span>' +
                            '<span class="category-tag tag-project">' + catLabel(game.category) + '</span>' +
                        '</div>' +
                        '<div class="game-title">' + game.title + badgeHtml + '</div>' +
                        '<p class="game-desc">' + game.description + '</p>' +
                        '<div class="game-meta"><span>' + game.version + '</span></div>';

                    grid.appendChild(card);
                    count++;
                }

                if (countEl) countEl.textContent = count + ' projects';
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', render);
            } else {
                render();
            }
        })();
    </script>
</body>
</html>
