<!DOCTYPE html>
<html lang="en" data-theme="pro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Puzzle - F.O.N.G. Arcade</title>
    <link rel="stylesheet" href="../css/components/global.css">
    <link rel="stylesheet" href="../css/components/card.css">
    <style>
        .hub-page-header {
            padding: 1.5rem 5% 0;
        }
        .hub-back {
            display: inline-block;
            font-size: 0.8rem;
            font-family: var(--font-mono);
            color: var(--text-muted);
            text-decoration: none;
            margin-bottom: 1.25rem;
            transition: color 0.2s;
        }
        .hub-back:hover { color: var(--text-secondary); }
        .hub-grid-section {
            padding: 0 5% 3rem;
        }
    </style>
</head>
<body>

    <header class="global-nav">
        <a href="../index.html" class="nav-brand">F.O.N.G. ARCADE</a>
        <div class="nav-right">
            <a href="../index.html" class="theme-toggle-link" id="back-link">&larr; Home</a>
        </div>
    </header>

    <main>
        <div class="hub-page-header">
            <div class="library-header">
                <h2 class="library-title">Puzzle Games</h2>
                <span id="hub-count" class="library-count"></span>
            </div>
        </div>

        <section class="hub-grid-section">
            <div id="hub-grid" class="game-grid" role="list"></div>
        </section>
    </main>

    <script src="../js/catalog.js"></script>
    <script>
        (function() {
            'use strict';

            var CATALOG = window.FONG_CATALOG || [];
            var HUB_CATEGORY = 'puzzle';

            // Detect theme
            var params = (window.location.search || '').toLowerCase();
            var MODE = params.indexOf('mode=fun') !== -1 ? 'fun' : 'pro';
            document.documentElement.setAttribute('data-theme', MODE);

            // Update back link with theme
            if (MODE === 'fun') {
                var backLink = document.getElementById('back-link');
                if (backLink) backLink.href = '../index.html?mode=fun';
            }

            function catLabel(cat) {
                var labels = { card: 'Card', arcade: 'Arcade', puzzle: 'Puzzle', edu: 'Educational', project: 'Project' };
                return labels[cat] || cat;
            }

            function render() {
                var grid = document.getElementById('hub-grid');
                var countEl = document.getElementById('hub-count');
                if (!grid) return;

                var count = 0;
                grid.innerHTML = '';

                for (var i = 0; i < CATALOG.length; i++) {
                    var game = CATALOG[i];
                    if (game.category !== HUB_CATEGORY) continue;

                    // Theme filtering
                    if (game.theme === 'pro' && MODE === 'fun') continue;
                    if (game.theme === 'fun' && MODE === 'pro') continue;

                    // Adjust href: catalog paths are relative to root (./games/X)
                    // This page is inside /puzzle/, so replace './' with '../'
                    var href = game.href.replace('./', '../');

                    var title = MODE === 'fun' ? game.funTitle : game.title;
                    var desc = MODE === 'fun' ? game.funDescription : game.description;
                    var tagClass = 'tag-' + game.category;
                    var badgeHtml = game.isNew ? '<span class="badge-new">NEW</span>' : '';

                    var card = document.createElement('a');
                    card.href = href;
                    card.className = 'game-card';
                    card.setAttribute('data-category', game.category);

                    card.innerHTML =
                        '<div class="card-top">' +
                            '<span class="card-icon">' + game.icon + '</span>' +
                            '<span class="category-tag ' + tagClass + '">' + catLabel(game.category) + '</span>' +
                        '</div>' +
                        '<div class="game-title">' + title + badgeHtml + '</div>' +
                        '<p class="game-desc">' + desc + '</p>' +
                        '<div class="game-meta"><span>' + game.version + '</span></div>';

                    grid.appendChild(card);
                    count++;
                }

                if (countEl) countEl.textContent = count + ' games';
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', render);
            } else {
                render();
            }
        })();
    </script>
</body>
</html>
