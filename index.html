<!DOCTYPE html>
<html lang="en" data-theme="pro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>F.O.N.G. Arcade | Home</title>
    <link rel="stylesheet" href="./css/components/global.css">
    <link rel="stylesheet" href="./css/components/card.css">
</head>
<body>

    <header class="global-nav">
        <a href="./index.html" class="nav-brand">F.O.N.G. ARCADE</a>
        <div class="nav-right">
            <div id="global-play-count" class="stats-container">Plays: --</div>
            <a href="?mode=fun" id="theme-toggle" class="theme-toggle-link">&#127918; Fun Mode</a>
        </div>
    </header>

    <main>
        <!-- Featured Game Hero - rendered by hub-filters.js -->
        <section class="featured-section" id="featured-section" aria-label="Featured game"></section>

        <!-- Game Library -->
        <section class="library-section">
            <div class="library-header">
                <h2 class="library-title">Game Library</h2>
                <span id="game-count" class="library-count"></span>
            </div>
            <div id="category-filters" class="filter-bar" role="tablist" aria-label="Filter games by category">
                <button class="filter-btn active" data-category="all" role="tab">All</button>
                <button class="filter-btn" data-category="arcade" role="tab">Arcade</button>
                <button class="filter-btn" data-category="card" role="tab">Card</button>
                <button class="filter-btn" data-category="puzzle" role="tab">Puzzle</button>
                <button class="filter-btn" data-category="edu" role="tab">Educational</button>
                <button class="filter-btn" data-category="project" role="tab">Projects</button>
            </div>
            <!-- Game cards rendered by hub-filters.js -->
            <div id="game-grid" class="game-grid" role="list"></div>
        </section>
    </main>

    <script src="./js/hub-data.js"></script>
    <script src="./js/hub-filters.js"></script>
</body>
</html>
